name: Deploy

on:
  workflow_run:                        # triggers after ci.yml completes
    workflows: ["CI - Build & Push"]
    types: [completed]
    branches: ["main"]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (git SHA) to deploy"
        required: true

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Resolve Image Tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "IMAGE_TAG=${{ inputs.image_tag }}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_ENV
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user
            export IMAGE_TAG=${{ env.IMAGE_TAG }}
            docker compose pull
            docker compose up -d

