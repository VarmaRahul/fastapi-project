name: Continuous Integration

on:
  workflow_dispatch:
    branches: [ "main" ]
  # push:
  #   branches: [ "main" ]
  # pull_request:
  #   branches: [ "main" ]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ruff (Fastest Linter)
        run: pip install ruff
      - name: Run Ruff Check
        run: ruff check .
  
  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          ignore: DL3008
    
  gitleaks:
    name: Secrets Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
  
  sast-codeql:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  dependency-license-scan:
    name: Dependency & License Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: |
          pip install pip-audit pip-licenses

      - name: Dependency Vulnerability Scan
        run: pip-audit

      - name: License Check
        run: pip-licenses


  build-test:
    name: build-test
    #needs: [lint, dockerfile-lint, dependency-license-scan]
    runs-on: ubuntu-latest
    
    # We need a database for our tests! 
    # GitHub Actions can run "Services" (Sidecar containers)
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rahul_admin
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: ultimate_platform_test
        ports:
          - 5432:5432
        # Wait for postgres to be ready
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Run Pytest
        env:
          PYTHONPATH: .
          DB_USER: rahul_admin
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ultimate_platform_test
          DB_CONNECTION: postgresql://rahul_admin:${{ secrets.DB_PASSWORD }}@localhost:5432/ultimate_platform_test
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
        run: |
          pip install -r requirements.txt
          pip install pytest httpx
          pytest
  
  build-scan-push:
    name: Build, Scan & Push
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Image
        run: docker build -t xedose/fastapi-app:${{ github.sha }} .

      - name: Scan Image (Trivy)
        uses: aquasecurity/trivy-action@v0.35.0
        continue-on-error: true
        with:
          image-ref: xedose/fastapi-app:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH

      - name: Push Image
        run: docker push xedose/fastapi-app:${{ github.sha }}

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      infra_changed: ${{ steps.filter.outputs.infra }}

    steps:
      - uses: actions/checkout@v4

      - name: Check for infra changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            infra:
              - 'terraform/**'
              - '**/*.tf'        
  
  infra:
    name: Provision Infrastructure
    needs: [build-scan-push, detect-changes]
    if: needs.detect-changes.outputs.infra_changed == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    outputs:
      ec2_ip: ${{ steps.tf_output.outputs.ec2_ip }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Get EC2 IP
        id: tf_output
        run: |
          sudo apt-get install -y jq
          IP=$(terraform output -json ec2_public_ip | jq -r '.[0]')
          echo "ec2_ip=$IP" >> $GITHUB_OUTPUT
  
  deploy:
    name: Deploy
    needs: [infra, detect-changes]
    runs-on: ubuntu-latest

    steps:
      - name: Set EC2 IP
        id: set-ip
        run: |
          if [ "${{ needs.detect-changes.outputs.infra_changed }}" == "true" ]; then
            echo "EC2_IP=${{ needs.infra.outputs.ec2_ip }}" >> $GITHUB_ENV
          else
            echo "EC2_IP=${{ secrets.EC2_HOST }}" >> $GITHUB_ENV
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.EC2_IP }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user

            export IMAGE_TAG=${{ github.sha }}

            docker-compose pull
            docker-compose up -d
      
      

  
  