name: CI - Build & Push

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .

  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          ignore: DL3008

  gitleaks:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2

  sast-codeql:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

  dependency-scan:
    name: Dependency & License Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit pip-licenses
      - run: pip-audit
      - run: pip-licenses

  build-test:
    name: Build & Test
    needs: [lint, dockerfile-lint, gitleaks]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rahul_admin
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: ultimate_platform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Run Pytest
        env:
          PYTHONPATH: .
          DB_USER: rahul_admin
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ultimate_platform_test
          DB_CONNECTION: postgresql://rahul_admin:${{ secrets.DB_PASSWORD }}@localhost:5432/ultimate_platform_test
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
        run: |
          pip install -r requirements.txt pytest httpx
          pytest

  build-scan-push:
    name: Build, Scan & Push
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build Image
        run: docker build -t xedose/fastapi-app:${{ github.sha }} .
      - name: Scan Image (Trivy)
        uses: aquasecurity/trivy-action@v0.35.0
        continue-on-error: true
        with:
          image-ref: xedose/fastapi-app:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
      - name: Push Image
        run: docker push xedose/fastapi-app:${{ github.sha }}