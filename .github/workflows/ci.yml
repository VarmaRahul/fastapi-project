name: Continuous Integration

on:
  workflow_dispatch:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ruff (Fastest Linter)
        run: pip install ruff
      - name: Run Ruff Check
        run: ruff check .
  
  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          ignore: DL3008
    
  gitleaks:
    name: Secrets Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
  
  sast-codeql:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  dependency-license-scan:
    name: Dependency & License Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: |
          pip install pip-audit pip-licenses

      - name: Dependency Vulnerability Scan
        run: pip-audit

      - name: License Check
        run: pip-licenses


  build-test:
    name: build-test
    needs: [lint, dockerfile-lint, dependency-license-scan]
    runs-on: ubuntu-latest
    
    # We need a database for our tests! 
    # GitHub Actions can run "Services" (Sidecar containers)
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rahul_admin
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: ultimate_platform_test
        ports:
          - 5432:5432
        # Wait for postgres to be ready
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Run Pytest
        env:
          PYTHONPATH: .
          DB_USER: rahul_admin
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ultimate_platform_test
          DB_CONNECTION: postgresql://rahul_admin:${{ secrets.DB_PASSWORD }}@localhost:5432/ultimate_platform_test
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
        run: |
          pip install -r requirements.txt
          pip install pytest httpx
          pytest
  
  build-scan-push:
    name: Build, Scan & Push
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Image
        run: docker build -t xedose/fastapi-app:${{ github.sha }} .

      - name: Scan Image (Trivy)
        uses: aquasecurity/trivy-action@0.20.0
        continue-on-error: true
        with:
          image-ref: xedose/fastapi-app:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH

      - name: Push Image
        run: docker push xedose/fastapi-app:${{ github.sha }}