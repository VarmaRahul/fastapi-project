name: Continuous Integration

on:
  workflow_dispatch:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ruff (Fastest Linter)
        run: pip install ruff
      - name: Run Ruff Check
        run: ruff check .

  build-test:
    name: Build and Test
    needs: lint
    runs-on: ubuntu-latest
    
    # We need a database for our tests! 
    # GitHub Actions can run "Services" (Sidecar containers)
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rahul_admin
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: ultimate_platform_test
        ports:
          - 5432:5432
        # Wait for postgres to be ready
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Run Pytest
        env:
          PYTHONPATH: .
          DB_USER: rahul_admin
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ultimate_platform_test
          DB_CONNECTION: postgresql://rahul_admin:${{ secrets.DB_PASSWORD }}@localhost:5432/ultimate_platform_test
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
        run: |
          pip install -r requirements.txt
          pip install pytest httpx
          pytest
  
  build-and-push:
    name: build-and-push
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          # 'context: .' tells Docker to look for the 'Dockerfile' in the root
          context: .
          # 'push: true' tells it to upload the image to Docker Hub after building
          push: true
          # 'tags' defines the name and version of your image
          tags: your-dockerhub-user/fastapi-app:${{ github.sha }}